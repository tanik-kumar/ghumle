worker_processes auto;

events {
  worker_connections 1024;
}

http {
  upstream ghumle_web {
    server web:3000;
  }

  upstream ghumle_api {
    server api:4000;
  }

  server {
    listen 80;
    server_name _;

    location /api/ {
      proxy_pass http://ghumle_api;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://ghumle_web;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
