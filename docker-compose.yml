version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ghumle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ghumle
      POSTGRES_PASSWORD: ghumle
      POSTGRES_DB: ghumle
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ghumle-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - '4000:4000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - '3000:3000'

volumes:
  postgres-data:
  redis-data:
