name: Feature request
description: Propose an improvement for Ghumle
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for product, platform, or developer-experience improvements.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the ideal behavior or change
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and impact
      description: Product area, modules, or user flows affected
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
